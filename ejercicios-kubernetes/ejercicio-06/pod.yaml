apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-externo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-publica
  template:
    metadata:
      labels:
        app: web-publica
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
---
apiVersion: v1
kind: Service
metadata:
  name: servicio-publico
spec:
  type: NodePort
  selector:
    app: web-publica
  ports:
    - port: 80          # Puerto interno del Service
      targetPort: 80    # Puerto del contenedor
      nodePort: 30080   # Puerto abierto en todos los Nodos (Rango 30000-32767)
