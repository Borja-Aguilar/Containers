apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replicaset-web
  labels:
    app: mi-web
spec:
  replicas: 3
  selector:
    matchLabels:
      tier: frontend
  template:
    metadata:
      labels:
        tier: frontend
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
